name: Build Aluminium CLI

on:
  push:
    tags:
      - 'v*.*.*'     # Triggers a Release when you push a version tag like v2.0.1
    paths:
      - 'AluminiumCLI/**'
    branches:
      - main
  pull_request:
    paths:
      - 'AluminiumCLI/**'

permissions:
  contents: write  # Needed to create GitHub Releases and upload assets

jobs:
  build:
    name: Compile CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'AluminiumCLI/go.mod'
          cache-dependency-path: 'AluminiumCLI/go.sum'

      - name: Build CLI for Multiple Platforms
        run: |
          cd AluminiumCLI
          mkdir -p dist
          
          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -o dist/aluminium-linux-amd64 ./cmd/aluminium

          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -o dist/aluminium-linux-arm64 ./cmd/aluminium
          
          # macOS amd64 (Intel)
          GOOS=darwin GOARCH=amd64 go build -o dist/aluminium-darwin-amd64 ./cmd/aluminium
          
          # macOS arm64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -o dist/aluminium-darwin-arm64 ./cmd/aluminium
          
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -o dist/aluminium-windows-amd64.exe ./cmd/aluminium

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aluminium-cli-binaries
          path: AluminiumCLI/dist/*

      # Only publish a GitHub Release when a version tag was pushed (e.g. v2.0.1)
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Aluminium CLI ${{ github.ref_name }}"
          body: "Automated release of Aluminium CLI ${{ github.ref_name }}."
          files: |
            AluminiumCLI/dist/aluminium-linux-amd64
            AluminiumCLI/dist/aluminium-darwin-amd64
            AluminiumCLI/dist/aluminium-darwin-arm64
            AluminiumCLI/dist/aluminium-windows-amd64.exe
