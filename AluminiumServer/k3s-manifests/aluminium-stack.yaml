# 1. THE STORAGE RESERVATION (Your docker named volume)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 40Gi # 👈 This controls how mu ch space your DB gets!
---
# 2. THE MONGODB DATABASE DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-local
  template:
    metadata:
      labels:
        app: mongodb-local
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: "aluminium_packages"
          volumeMounts:
            - name: db-storage
              mountPath: /data/db # Maps inside the container just like compose
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: mongodb-data-pvc # Hooks into the storage defined above
---
# 3. THE MONGODB SERVICE (Allows the app to look up "mongodb-local")
apiVersion: v1
kind: Service
metadata:
  name: mongodb-local
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: mongodb-local
---
# 4. YOUR APPLICATION SERVER DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aluminium-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aluminium-server
  template:
    metadata:
      labels:
        app: aluminium-server
    spec:
      containers:
        - name: aluminium-server
          image: ghcr.io/pandatwoxx/aluminium/aluminium-server:5cb400bd6b3329e0d4c0361e2c7acff1ae241f23
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URI
              value: "mongodb://mongodb-local:27017/aluminium_packages"
---
# 5. YOUR APPLICATION SERVER SERVICE
apiVersion: v1
kind: Service
metadata:
  name: aluminium-server
spec:
  type: ClusterIP  # 👈 This explicitly creates the internal Cluster IPPPPSL
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: aluminium-server